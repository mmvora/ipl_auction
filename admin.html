<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPL Fantasy League 2026 — Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
    .card-gold{border-top:3px solid var(--gold)}

    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:4px;font-size:0.72rem;font-weight:600;white-space:nowrap}
    .badge-batter{background:#1a2e1a;color:#4ade80;border:1px solid #166534}
    .badge-bowler{background:#1e1a2e;color:#a78bfa;border:1px solid #4c1d95}
    .badge-allrounder{background:#2e1a1a;color:#f87171;border:1px solid #7f1d1d}
    .badge-keeper{background:#1a2330;color:#60a5fa;border:1px solid #1e3a5f}
    .badge-indian{background:#1f1a00;color:#fbbf24;border:1px solid #78350f}
    .badge-overseas{background:#001f1f;color:#2dd4bf;border:1px solid #134e4a}
    .badge-team{background:var(--muted-bg);color:var(--muted);border:1px solid var(--border)}

    .player-card{padding:24px;text-align:center}
    .player-name{font-size:1.4rem;font-weight:800;margin:0 0 6px}
    .player-meta{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:16px}
    .bid-amount{font-size:2.4rem;font-weight:900;color:var(--gold);line-height:1;margin:6px 0}
    .bid-label{font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
    .bidder-name{font-size:1rem;font-weight:700;margin-top:6px}

    .banner{padding:14px 24px;text-align:center;font-weight:800;font-size:1rem;letter-spacing:0.04em}
    .banner-sold{background:linear-gradient(135deg,#166534,#14532d);color:#4ade80}
    .banner-unsold{background:linear-gradient(135deg,#7f1d1d,#450a0a);color:#f87171}

    /* Team bid buttons */
    .team-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--muted-bg);cursor:pointer;transition:all .15s;font-size:0.82rem;font-weight:600;color:var(--fg);width:100%}
    .team-btn:hover:not(:disabled){border-color:var(--gold);background:rgba(247,193,30,0.06)}
    .team-btn:disabled{opacity:0.3;cursor:not-allowed}
    .team-btn .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .team-btn.active-bidder{border-color:var(--gold);background:rgba(247,193,30,0.12);box-shadow:0 0 12px rgba(247,193,30,0.15)}
    .team-btn .info{margin-left:auto;font-size:0.68rem;color:var(--muted);font-weight:500}

    .act-btn{padding:10px 22px;border-radius:8px;font-size:0.85rem;font-weight:700;cursor:pointer;border:none;transition:all .12s}
    .act-btn:hover{filter:brightness(1.12)}
    .act-btn:disabled{opacity:0.35;cursor:not-allowed}
    .btn-sell{background:#16a34a;color:#fff}
    .btn-unsold{background:#dc2626;color:#fff}
    .btn-undo{background:var(--muted-bg);color:var(--muted);border:1px solid var(--border)}
    .btn-next{background:var(--gold);color:#07111e}
    .btn-nominate{background:var(--gold);color:#07111e}
    .btn-init{background:var(--muted-bg);color:var(--muted);border:1px solid var(--border)}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
    .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:700px;max-height:85vh;display:flex;flex-direction:column}
    .modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .modal-body{padding:16px 24px;overflow-y:auto;flex:1}
    .modal-close{background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;padding:4px 8px}
    .modal-close:hover{color:var(--fg)}
    .picker-search{background:var(--muted-bg);border:1px solid var(--border);color:var(--fg);border-radius:7px;padding:8px 12px;font-size:0.85rem;outline:none;width:100%;margin-bottom:12px}
    .picker-search::placeholder{color:var(--muted)}
    .picker-search:focus{border-color:var(--gold)}
    .picker-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:6px;transition:background .1s}
    .picker-row:hover{background:var(--muted-bg)}
    .picker-row .pname{font-weight:600;font-size:0.88rem}
    .picker-row .pmeta{font-size:0.72rem;color:var(--muted)}
    .picker-group{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--gold);padding:8px 12px;background:rgba(247,193,30,0.05);border-radius:4px;margin:8px 0 4px}

    .history-item{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:0.76rem;border-bottom:1px solid var(--border)}
    .history-item:last-child{border-bottom:none}

    .lock-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
    .lock-screen input{background:var(--muted-bg);border:1px solid var(--border);color:var(--fg);border-radius:8px;padding:12px 16px;font-size:1rem;outline:none;width:240px;text-align:center}
    .lock-screen input:focus{border-color:var(--gold)}

    /* C/VC badges */
    .badge-c{background:rgba(247,193,30,0.15);color:var(--gold);border:1px solid rgba(247,193,30,0.4);font-size:0.6rem;padding:1px 6px;border-radius:3px;font-weight:800;letter-spacing:0.04em}
    .badge-vc{background:rgba(148,163,184,0.12);color:#94a3b8;border:1px solid rgba(148,163,184,0.3);font-size:0.6rem;padding:1px 6px;border-radius:3px;font-weight:800;letter-spacing:0.04em}
    .captain-name{color:var(--gold)!important;font-weight:700!important}
    .vc-name{color:#94a3b8!important;font-weight:600!important}

    /* Team management tabs */
    .tm-tab{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--muted-bg);cursor:pointer;font-size:0.78rem;font-weight:600;color:var(--muted);transition:all .15s;display:flex;align-items:center;gap:6px}
    .tm-tab:hover{border-color:var(--gold);color:var(--fg)}
    .tm-tab.active{border-color:var(--gold);background:rgba(247,193,30,0.1);color:var(--gold)}

    .tm-squad-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);font-size:0.84rem}
    .tm-squad-row:last-child{border-bottom:none}
    .tm-squad-row .name{font-weight:600;flex:1}
    .tm-squad-row .price{color:var(--gold);font-weight:700;font-size:0.78rem;min-width:60px;text-align:right}
    .tm-squad-row .actions{display:flex;gap:4px}
    .tm-squad-row .actions button{padding:3px 8px;border-radius:4px;font-size:0.65rem;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--muted-bg);color:var(--muted);transition:all .12s}
    .tm-squad-row .actions button:hover{border-color:var(--gold);color:var(--fg)}
    .tm-squad-row .actions button.active-c{background:rgba(247,193,30,0.15);color:var(--gold);border-color:rgba(247,193,30,0.4)}
    .tm-squad-row .actions button.active-vc{background:rgba(148,163,184,0.12);color:#94a3b8;border-color:rgba(148,163,184,0.3)}
    .pts-adj{display:flex;align-items:center;gap:3px;min-width:110px}
    .pts-adj input{width:56px;background:var(--muted-bg);border:1px solid var(--border);color:var(--fg);border-radius:4px;padding:3px 5px;font-size:0.72rem;font-weight:600;text-align:center;outline:none}
    .pts-adj input:focus{border-color:var(--gold)}
    .pts-adj button{padding:3px 7px;border-radius:4px;font-size:0.65rem;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--muted-bg);color:var(--muted);transition:all .12s}
    .pts-adj button:hover{border-color:var(--gold);color:var(--fg)}
    .pts-adj-label{font-size:0.6rem;color:var(--muted);font-weight:600}

    @keyframes sold-pop{0%{transform:scale(0.9);opacity:0}50%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
    .sold-anim{animation:sold-pop 0.4s ease-out}

    .hidden{display:none!important}
  </style>
  <script src="header.js"></script>
</head>
<body>

  <!-- Lock screen -->
  <div id="lock-screen" class="lock-screen">
    <div style="width:64px;height:64px;border-radius:50%;background:var(--muted-bg);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 0 16px rgba(247,193,30,0.25);">🔒</div>
    <h2 style="font-size:1.1rem;font-weight:700;margin:0;">Admin Panel</h2>
    <p style="font-size:0.82rem;color:var(--muted);margin:0;">Enter password to access auctioneer controls</p>
    <input type="password" id="admin-pw" placeholder="Password…" />
    <button class="act-btn btn-nominate" id="admin-login-btn" style="width:240px;">Unlock</button>
    <span id="admin-err" style="font-size:0.78rem;color:#f87171;"></span>
  </div>

  <!-- Main admin UI (hidden until auth) -->
  <main id="admin-main" class="hidden" style="max-width:1100px;margin:0 auto;padding:24px 16px;">

    <!-- Top bar -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;">
      <div>
        <h1 style="font-size:1.1rem;font-weight:800;margin:0 0 2px;">Auctioneer Console</h1>
        <p style="font-size:0.75rem;color:var(--muted);margin:0;">
          Remaining: <strong id="stat-rem" style="color:var(--fg)">0</strong> &nbsp;·&nbsp;
          Sold: <strong id="stat-sold" style="color:#4ade80">0</strong> &nbsp;·&nbsp;
          Unsold: <strong id="stat-unsold" style="color:#f87171">0</strong>
        </p>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="act-btn btn-init" onclick="initAuction()">Reset Auction</button>
        <button class="act-btn btn-undo" onclick="lockAdmin()">🔒 Lock</button>
      </div>
    </div>

    <!-- State: Idle -->
    <div id="s-idle" class="card card-gold" style="text-align:center;padding:48px 24px;">
      <div style="font-size:2rem;margin-bottom:12px;">🔨</div>
      <h2 style="font-size:1.1rem;font-weight:700;margin:0 0 8px;">Ready for next player</h2>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:12px;">
        <button class="act-btn btn-nominate" onclick="randomPlayer()">🎲 Random Player</button>
        <button class="act-btn btn-undo" onclick="openPicker()">Pick Manually</button>
      </div>
    </div>

    <!-- State: Nominating / Bidding -->
    <div id="s-active" class="hidden">
      <div class="card card-gold">
        <div class="player-card" style="padding-bottom:12px;">
          <div class="player-meta" id="a-meta"></div>
          <div class="player-name" id="a-name"></div>
          <div class="bid-label" id="a-bid-label">BASE PRICE</div>
          <div class="bid-amount" id="a-bid-amount"></div>
          <div id="a-bidder-wrap" class="hidden">
            <div class="bid-label">HIGHEST BIDDER</div>
            <div class="bidder-name" id="a-bidder-name"></div>
          </div>
        </div>

        <!-- Team buttons -->
        <div style="padding:0 20px 16px;">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
            <div style="font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);">Place bid for team</div>
            <div style="display:flex;align-items:center;gap:6px;margin-left:auto;">
              <span style="font-size:0.68rem;color:var(--muted);font-weight:600;">Custom bid:</span>
              <input type="number" id="custom-bid" placeholder="" style="background:var(--muted-bg);border:1px solid var(--border);color:var(--gold);border-radius:6px;padding:6px 10px;font-size:0.85rem;font-weight:700;outline:none;width:100px;text-align:center;" />
              <span style="font-size:0.72rem;color:var(--muted);font-weight:600;">L</span>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px;" id="team-btns"></div>
        </div>

        <!-- Action buttons -->
        <div style="display:flex;gap:10px;justify-content:center;padding:0 20px 20px;flex-wrap:wrap;">
          <button class="act-btn btn-undo" id="btn-undo" onclick="undoLastBid()" disabled>Undo Last Bid</button>
          <button class="act-btn btn-unsold" onclick="markUnsold()">Unsold</button>
          <button class="act-btn btn-sell" id="btn-sell" onclick="sellPlayer()" disabled>Sold!</button>
        </div>

        <!-- Bid history -->
        <div style="padding:0 20px 16px;" id="a-history-wrap" class="hidden">
          <div style="font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:6px;">Bid History</div>
          <div id="a-bid-history"></div>
        </div>
      </div>
    </div>

    <!-- State: Sold -->
    <div id="s-sold" class="hidden">
      <div class="card sold-anim" style="border-top:3px solid #22c55e;">
        <div class="banner banner-sold">SOLD!</div>
        <div class="player-card">
          <div class="player-name" id="s-sold-name"></div>
          <div class="bid-amount" style="color:#4ade80" id="s-sold-price"></div>
          <div class="bidder-name" id="s-sold-to"></div>
          <div style="margin-top:20px;">
            <button class="act-btn btn-next" onclick="nextPlayer()">Next Player →</button>
          </div>
        </div>
      </div>
    </div>

    <!-- State: Unsold -->
    <div id="s-unsold" class="hidden">
      <div class="card sold-anim" style="border-top:3px solid #ef4444;">
        <div class="banner banner-unsold">UNSOLD</div>
        <div class="player-card">
          <div class="player-name" id="s-unsold-name"></div>
          <div style="margin-top:20px;">
            <button class="act-btn btn-next" onclick="nextPlayer()">Next Player →</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══ Team Management ═══ -->
    <div class="card" style="margin-top:24px;border-top:3px solid var(--gold);">
      <div style="padding:20px;">
        <h2 style="font-size:1rem;font-weight:800;margin:0 0 14px;">Team Management</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;" id="tm-team-tabs"></div>
        <div id="tm-squad-area"></div>
      </div>
    </div>

  </main>

  <!-- Add player to team modal -->
  <div class="modal-overlay hidden" id="addplayer-modal" onclick="if(event.target===this)closeAddPlayer()">
    <div class="modal-box">
      <div class="modal-header">
        <span style="font-size:1rem;font-weight:700;">Add Player to <span id="addplayer-team-name"></span></span>
        <button class="modal-close" onclick="closeAddPlayer()">&times;</button>
      </div>
      <div class="modal-body">
        <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;">
          <input class="picker-search" id="addplayer-search" type="text" placeholder="Search player…" oninput="renderAddPlayerList()" style="flex:1">
          <div style="display:flex;align-items:center;gap:4px;">
            <span style="font-size:0.72rem;color:var(--muted);font-weight:600;">Price:</span>
            <input type="number" id="addplayer-price" value="0" min="0" style="background:var(--muted-bg);border:1px solid var(--border);color:var(--gold);border-radius:6px;padding:6px 10px;font-size:0.85rem;font-weight:700;outline:none;width:80px;text-align:center;" />
            <span style="font-size:0.72rem;color:var(--muted);font-weight:600;">L</span>
          </div>
        </div>
        <div id="addplayer-list"></div>
      </div>
    </div>
  </div>

  <!-- Player picker modal -->
  <div class="modal-overlay hidden" id="picker-modal" onclick="if(event.target===this)closePicker()">
    <div class="modal-box">
      <div class="modal-header">
        <span style="font-size:1rem;font-weight:700;">Nominate a Player</span>
        <button class="modal-close" onclick="closePicker()">&times;</button>
      </div>
      <div class="modal-body">
        <input class="picker-search" id="picker-search" type="text" placeholder="Search player…" oninput="renderPicker()">
        <div id="picker-list"></div>
      </div>
    </div>
  </div>

    function pKey(name) { return name.replace(/[\s.]/g, '_'); }
    function basePriceToLakhs(p) { return p === '5 CR' ? 500 : p === '1 CR' ? 100 : 10; }
    function nextBid(cur) { if (cur < 500) return cur + 10; if (cur < 1000) return cur + 20; return cur + 50; }
    function fmtL(l) { if (l >= 100) { const c = l / 100; return (c % 1 === 0 ? c : c.toFixed(1)) + ' CR'; } return l + ' L'; }

    function roleBadgeClass(r) {
      if (r === 'Batter') return 'badge-batter';
      if (r === 'Bowler') return 'badge-bowler';
      if (r === 'All-rounder') return 'badge-allrounder';
      if (r === 'Wicketkeeper') return 'badge-keeper';
      return '';
    }

    function makeMetaHTML(p) {
      if (!p) return '';
      return `<span class="badge ${roleBadgeClass(p.role)}">${p.role}</span>
        <span class="badge badge-team">${p.iplTeam}</span>
        <span class="badge ${p.type === 'Indian' ? 'badge-indian' : 'badge-overseas'}">${p.type}</span>`;
    }

    let aState = {}, tData = {}, soldD = {}, unsoldD = {};

    // ── Auth ──
    document.getElementById('admin-login-btn').addEventListener('click', tryLogin);
    document.getElementById('admin-pw').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

    function tryLogin() {
      if (document.getElementById('admin-pw').value === ADMIN_PW) {
        document.getElementById('lock-screen').classList.add('hidden');
        document.getElementById('admin-main').classList.remove('hidden');
      } else {
        document.getElementById('admin-err').textContent = 'Wrong password';
      }
    }

    window.lockAdmin = function() {
      document.getElementById('lock-screen').classList.remove('hidden');
      document.getElementById('admin-main').classList.add('hidden');
      document.getElementById('admin-pw').value = '';
      document.getElementById('admin-err').textContent = '';
    };

    // ── Firebase listeners ──
    onValue(ref(db, 'auction'), snap => { aState = snap.val() || {}; render(); });
    onValue(ref(db, 'teams'),   snap => { tData  = snap.val() || {}; render(); renderTMTabs(); if (selectedTeam) renderTMSquad(); });
    onValue(ref(db, 'sold'),    snap => { soldD  = snap.val() || {}; updateStats(); });
    onValue(ref(db, 'unsold'),  snap => { unsoldD= snap.val() || {}; updateStats(); });

    function showOnly(id) {
      ['s-idle','s-active','s-sold','s-unsold'].forEach(s =>
        document.getElementById(s).classList.toggle('hidden', s !== id));
    }

    function render() {
      const st = aState.status || 'idle';

      if (st === 'idle') { showOnly('s-idle'); return; }

      const p = aState.currentPlayer;

      if (st === 'nominating' || st === 'bidding') {
        showOnly('s-active');
        document.getElementById('a-name').textContent = p?.name || '';
        document.getElementById('a-meta').innerHTML = makeMetaHTML(p);
        document.getElementById('a-bid-amount').textContent = fmtL(aState.currentBid || 0);

        if (aState.currentBidder && FT_MAP[aState.currentBidder]) {
          document.getElementById('a-bid-label').textContent = 'CURRENT BID';
          document.getElementById('a-bidder-wrap').classList.remove('hidden');
          const ft = FT_MAP[aState.currentBidder];
          document.getElementById('a-bidder-name').innerHTML = `<span style="color:${ft.c}">${ft.e} ${ft.n}</span>`;
        } else {
          document.getElementById('a-bid-label').textContent = 'BASE PRICE';
          document.getElementById('a-bidder-wrap').classList.add('hidden');
        }

        renderTeamBtns();
        renderHistory();
        return;
      }

      if (st === 'sold') {
        showOnly('s-sold');
        document.getElementById('s-sold-name').textContent = p?.name || '';
        document.getElementById('s-sold-price').textContent = fmtL(aState.currentBid || 0);
        if (aState.currentBidder && FT_MAP[aState.currentBidder]) {
          const ft = FT_MAP[aState.currentBidder];
          document.getElementById('s-sold-to').innerHTML = `<span style="color:${ft.c}">${ft.e} ${ft.n}</span>`;
        }
        return;
      }

      if (st === 'unsold') {
        showOnly('s-unsold');
        document.getElementById('s-unsold-name').textContent = p?.name || '';
        return;
      }
    }

    function renderTeamBtns() {
      const grid = document.getElementById('team-btns');
      const cb = aState.currentBidder;
      const cur = aState.currentBid || 0;
      const newAmt = (cb && cb !== '') ? nextBid(cur) : cur;

      grid.innerHTML = FTMS.map(ft => {
        const td = tData[ft.k] || {};
        const budget = td.budgetLakhs ?? 10000;
        const sq = td.squad ? Object.keys(td.squad).length : 0;
        const isSelf = cb === ft.k;
        const dis = isSelf || budget < newAmt || sq >= MAX_SQUAD;
        const acl = isSelf ? ' active-bidder' : '';

        return `<button class="team-btn${acl}" ${dis ? 'disabled' : ''} onclick="placeBid('${ft.k}')">
          <span style="font-size:1.1rem;line-height:1">${ft.e}</span>
          <span class="dot" style="background:${ft.c}"></span>
          <span>${ft.k}</span>
          <span class="info">${fmtL(budget)} · ${sq}/11</span>
        </button>`;
      }).join('');

      document.getElementById('btn-sell').disabled = !cb;
      document.getElementById('btn-undo').disabled = !aState.bidHistory || Object.keys(aState.bidHistory).length === 0;
      document.getElementById('custom-bid').placeholder = newAmt + ' L';
    }

    function renderHistory() {
      const wrap = document.getElementById('a-history-wrap');
      const cont = document.getElementById('a-bid-history');
      const bh = aState.bidHistory;
      if (!bh) { wrap.classList.add('hidden'); return; }
      const entries = Object.entries(bh).sort((a, b) => (b[1].ts || 0) - (a[1].ts || 0));
      if (!entries.length) { wrap.classList.add('hidden'); return; }
      wrap.classList.remove('hidden');
      cont.innerHTML = entries.map(([, v]) => {
        const ft = FT_MAP[v.team];
        return `<div class="history-item">
          <span style="background:${ft?.c||'#666'};width:8px;height:8px;border-radius:50%;flex-shrink:0"></span>
          <span style="font-weight:600;color:${ft?.c||'var(--fg)'}">${ft?.e||''} ${v.team}</span>
          <span style="margin-left:auto;color:var(--gold);font-weight:700;">${fmtL(v.amount)}</span>
        </div>`;
      }).join('');
    }

    function updateStats() {
      const sc = Object.keys(soldD).length, uc = Object.keys(unsoldD).length;
      document.getElementById('stat-rem').textContent = PLAYERS.length - sc - uc;
      document.getElementById('stat-sold').textContent = sc;
      document.getElementById('stat-unsold').textContent = uc;
    }

    // ── Admin actions ──
    window.initAuction = async function() {
      if (!confirm('Reset the entire auction? All squads and sold data will be erased.')) return;
      const teamsObj = {};
      FTMS.forEach(ft => { teamsObj[ft.k] = { name: ft.n, budgetLakhs: 10000, squad: {} }; });
      await set(ref(db), {
        auction: { status:'idle', currentPlayer:null, currentBid:0, currentBidder:null, bidHistory:null },
        teams: teamsObj, sold: null, unsold: null
      });
    };

    window.randomPlayer = async function() {
      const remaining = PLAYERS.filter(p => !soldD[pKey(p.N)] && !unsoldD[pKey(p.N)]);
      if (!remaining.length) { alert('No players remaining!'); return; }
      const p = remaining[Math.floor(Math.random() * remaining.length)];
      const baseLakhs = basePriceToLakhs(p.P);
      await update(ref(db, 'auction'), {
        status: 'nominating',
        currentPlayer: { name: p.N, role: p.R, iplTeam: p.T, type: p.Tp, basePriceLakhs: baseLakhs },
        currentBid: baseLakhs, currentBidder: null, bidHistory: null
      });
    };

    window.openPicker = function() {
      document.getElementById('picker-modal').classList.remove('hidden');
      document.getElementById('picker-search').value = '';
      window.renderPicker();
    };

    window.closePicker = function() {
      document.getElementById('picker-modal').classList.add('hidden');
    };

    window.renderPicker = function() {
      const q = document.getElementById('picker-search').value.toLowerCase();
      const remaining = PLAYERS.filter(p => !soldD[pKey(p.N)] && !unsoldD[pKey(p.N)]);
      const PO = { '5 CR': 0, '1 CR': 1, '10 L': 2 };
      remaining.sort((a, b) => (PO[a.P] ?? 9) - (PO[b.P] ?? 9));
      const filtered = q ? remaining.filter(p => p.N.toLowerCase().includes(q)) : remaining;
      const list = document.getElementById('picker-list');
      if (!filtered.length) { list.innerHTML = '<div style="text-align:center;padding:30px;color:var(--muted);">No players found</div>'; return; }
      let html = '', lastP = '';
      filtered.forEach(p => {
        if (p.P !== lastP) {
          const label = p.P === '5 CR' ? '5 Crore' : p.P === '1 CR' ? '1 Crore' : '10 Lakh';
          html += `<div class="picker-group">${label} — ${filtered.filter(x => x.P === p.P).length} players</div>`;
          lastP = p.P;
        }
        html += `<div class="picker-row" onclick="nominatePlayer('${p.N.replace(/'/g, "\\'")}')">
          <div><div class="pname">${p.N}</div><div class="pmeta">${p.R} · ${p.T} · ${p.Tp}</div></div>
          <span class="badge" style="background:rgba(247,193,30,0.1);color:var(--gold);border:1px solid rgba(247,193,30,0.3);">${p.P}</span>
        </div>`;
      });
      list.innerHTML = html;
    };

    window.nominatePlayer = async function(name) {
      const p = PLAYERS.find(x => x.N === name);
      if (!p) return;
      const baseLakhs = basePriceToLakhs(p.P);
      await update(ref(db, 'auction'), {
        status: 'nominating',
        currentPlayer: { name: p.N, role: p.R, iplTeam: p.T, type: p.Tp, basePriceLakhs: baseLakhs },
        currentBid: baseLakhs, currentBidder: null, bidHistory: null
      });
      window.closePicker();
    };

    window.placeBid = async function(teamKey) {
      const cb = aState.currentBidder;
      const cur = aState.currentBid || 0;
      if (cb === teamKey) return;
      const td = tData[teamKey] || {};
      const budget = td.budgetLakhs ?? 10000;
      const sq = td.squad ? Object.keys(td.squad).length : 0;

      const customInput = document.getElementById('custom-bid');
      const customVal = parseInt(customInput.value);
      let newBidAmt;
      if (customVal && customVal > cur) {
        newBidAmt = customVal;
      } else {
        newBidAmt = (cb && cb !== '') ? nextBid(cur) : cur;
      }
      if (budget < newBidAmt || sq >= MAX_SQUAD) return;
      customInput.value = '';

      const hk = push(ref(db, 'auction/bidHistory')).key;
      const u = {};
      u[`auction/bidHistory/${hk}`] = { team: teamKey, amount: newBidAmt, prevTeam: cb || '', prevAmount: cur, ts: Date.now() };
      u['auction/status'] = 'bidding';
      u['auction/currentBid'] = newBidAmt;
      u['auction/currentBidder'] = teamKey;
      await update(ref(db), u);
    };

    window.undoLastBid = async function() {
      const bh = aState.bidHistory;
      if (!bh) return;
      const keys = Object.keys(bh);
      if (!keys.length) return;
      const lastKey = keys[keys.length - 1];
      const last = bh[lastKey];
      const u = {};
      u['auction/currentBid'] = last.prevAmount;
      const hadPrev = last.prevTeam && last.prevTeam !== '';
      u['auction/currentBidder'] = hadPrev ? last.prevTeam : null;
      u['auction/status'] = hadPrev ? 'bidding' : 'nominating';
      u[`auction/bidHistory/${lastKey}`] = null;
      await update(ref(db), u);
    };

    window.sellPlayer = async function() {
      const buyer = aState.currentBidder;
      if (!buyer) return;
      const p = aState.currentPlayer;
      const pk = pKey(p.name);
      const cur = aState.currentBid;
      const td = tData[buyer] || {};
      const u = {};
      u['auction/status'] = 'sold';
      u[`teams/${buyer}/budgetLakhs`] = (td.budgetLakhs ?? 10000) - cur;
      u[`teams/${buyer}/squad/${pk}`] = { name: p.name, role: p.role, iplTeam: p.iplTeam, type: p.type, priceLakhs: cur };
      u[`sold/${pk}`] = { owner: buyer, priceLakhs: cur, ts: Date.now() };
      await update(ref(db), u);
    };

    window.markUnsold = async function() {
      const p = aState.currentPlayer;
      if (!p) return;
      await update(ref(db), { 'auction/status': 'unsold', [`unsold/${pKey(p.name)}`]: true });
    };

    window.nextPlayer = async function() {
      await update(ref(db, 'auction'), {
        status: 'idle', currentPlayer: null, currentBid: 0, currentBidder: null, bidHistory: null
      });
    };

    // ═══ Team Management ═══
    let selectedTeam = null;

    function renderTMTabs() {
      document.getElementById('tm-team-tabs').innerHTML = FTMS.map(ft => {
        const ac = selectedTeam === ft.k ? ' active' : '';
        const td = tData[ft.k] || {};
        const sq = td.squad ? Object.keys(td.squad).length : 0;
        return `<button class="tm-tab${ac}" onclick="selectTeam('${ft.k}')">
          <span>${ft.e}</span> ${ft.k} <span style="font-size:0.65rem;opacity:0.6">${sq}/11</span>
        </button>`;
      }).join('');
    }

    window.selectTeam = function(k) {
      selectedTeam = k;
      renderTMTabs();
      renderTMSquad();
    };

    function renderTMSquad() {
      const area = document.getElementById('tm-squad-area');
      if (!selectedTeam) { area.innerHTML = '<div style="color:var(--muted);font-size:0.82rem;padding:12px 0;">Select a team above</div>'; return; }

      const ft = FT_MAP[selectedTeam];
      const td = tData[selectedTeam] || {};
      const budget = td.budgetLakhs ?? 10000;
      const captain = td.captain || '';
      const viceCaptain = td.viceCaptain || '';
      const squad = td.squad ? Object.entries(td.squad) : [];

      let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div>
          <span style="font-size:1.1rem">${ft.e}</span>
          <span style="font-weight:700;color:${ft.c};font-size:0.95rem;">${ft.n}</span>
          <span style="font-size:0.78rem;color:var(--muted);margin-left:8px;">${fmtL(budget)} remaining · ${squad.length}/11</span>
        </div>
        <button class="act-btn btn-nominate" style="padding:7px 14px;font-size:0.78rem;" onclick="openAddPlayer()">+ Add Player</button>
      </div>`;

      if (squad.length === 0) {
        html += '<div style="color:var(--muted);font-size:0.82rem;padding:16px 0;text-align:center;">No players in squad</div>';
      } else {
        html += squad.map(([pk, s]) => {
          const isC = captain === pk;
          const isVC = viceCaptain === pk;
          const nameClass = isC ? ' captain-name' : isVC ? ' vc-name' : '';
          const badge = isC ? ' <span class="badge-c">C</span>' : isVC ? ' <span class="badge-vc">VC</span>' : '';
          const cBtnClass = isC ? ' active-c' : '';
          const vcBtnClass = isVC ? ' active-vc' : '';
          const adj = s.pointsAdj || 0;
          return `<div class="tm-squad-row">
            <span class="name${nameClass}">${s.name}${badge}</span>
            <span style="font-size:0.68rem;color:var(--muted)">${s.role} · ${s.iplTeam}</span>
            <span class="price">${fmtL(s.priceLakhs)}</span>
            <span class="pts-adj">
              <span class="pts-adj-label">adj</span>
              <input type="number" id="adj-${pk}" value="${adj}" onchange="saveAdj('${pk}', this.value)" />
              <button onclick="saveAdj('${pk}', document.getElementById('adj-${pk}').value)" title="Save adjustment">✓</button>
            </span>
            <span class="actions">
              <button class="${cBtnClass}" onclick="setCaptain('${pk}')" title="Set Captain">C</button>
              <button class="${vcBtnClass}" onclick="setVC('${pk}')" title="Set Vice Captain">VC</button>
            </span>
          </div>`;
        }).join('');
      }

      area.innerHTML = html;
    }

    window.setCaptain = async function(pk) {
      if (!selectedTeam) return;
      const td = tData[selectedTeam] || {};
      const newVal = td.captain === pk ? null : pk;
      await update(ref(db, `teams/${selectedTeam}`), { captain: newVal });
    };

    window.setVC = async function(pk) {
      if (!selectedTeam) return;
      const td = tData[selectedTeam] || {};
      const newVal = td.viceCaptain === pk ? null : pk;
      await update(ref(db, `teams/${selectedTeam}`), { viceCaptain: newVal });
    };

    window.saveAdj = async function(pk, val) {
      if (!selectedTeam) return;
      const num = parseInt(val) || 0;
      await update(ref(db, `teams/${selectedTeam}/squad/${pk}`), { pointsAdj: num });
    };

    // ── Add player to team ──
    let addPlayerTeam = null;

    window.openAddPlayer = function() {
      addPlayerTeam = selectedTeam;
      document.getElementById('addplayer-team-name').textContent = FT_MAP[selectedTeam]?.n || '';
      document.getElementById('addplayer-search').value = '';
      document.getElementById('addplayer-price').value = '0';
      document.getElementById('addplayer-modal').classList.remove('hidden');
      window.renderAddPlayerList();
    };

    window.closeAddPlayer = function() {
      document.getElementById('addplayer-modal').classList.add('hidden');
    };

    window.renderAddPlayerList = function() {
      const q = document.getElementById('addplayer-search').value.toLowerCase();
      const all = [...PLAYERS];
      const PO = { '5 CR': 0, '1 CR': 1, '10 L': 2 };
      all.sort((a, b) => (PO[a.P] ?? 9) - (PO[b.P] ?? 9));
      const filtered = q ? all.filter(p => p.N.toLowerCase().includes(q)) : all;
      const list = document.getElementById('addplayer-list');
      if (!filtered.length) { list.innerHTML = '<div style="text-align:center;padding:30px;color:var(--muted);">No players found</div>'; return; }
      let html = '', lastP = '';
      filtered.forEach(p => {
        if (p.P !== lastP) {
          const label = p.P === '5 CR' ? '5 Crore' : p.P === '1 CR' ? '1 Crore' : '10 Lakh';
          html += `<div class="picker-group">${label} — ${filtered.filter(x => x.P === p.P).length} players</div>`;
          lastP = p.P;
        }
        html += `<div class="picker-row" onclick="addPlayerToTeam('${p.N.replace(/'/g, "\\'")}')">
          <div><div class="pname">${p.N}</div><div class="pmeta">${p.R} · ${p.T} · ${p.Tp}</div></div>
          <span class="badge" style="background:rgba(247,193,30,0.1);color:var(--gold);border:1px solid rgba(247,193,30,0.3);">${p.P}</span>
        </div>`;
      });
      list.innerHTML = html;
    };

    window.addPlayerToTeam = async function(name) {
      if (!addPlayerTeam) return;
      const p = PLAYERS.find(x => x.N === name);
      if (!p) return;
      const price = parseInt(document.getElementById('addplayer-price').value) || 0;
      const pk = pKey(p.N);
      const td = tData[addPlayerTeam] || {};
      const budget = td.budgetLakhs ?? 10000;
      const sq = td.squad ? Object.keys(td.squad).length : 0;

      if (price > budget) { alert('Not enough budget'); return; }

      const u = {};
      u[`teams/${addPlayerTeam}/squad/${pk}`] = { name: p.N, role: p.R, iplTeam: p.T, type: p.Tp, priceLakhs: price };
      u[`teams/${addPlayerTeam}/budgetLakhs`] = budget - price;
      u[`sold/${pk}`] = { owner: addPlayerTeam, priceLakhs: price, ts: Date.now() };
      await update(ref(db), u);
      window.closeAddPlayer();
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPL Fantasy League 2026 — Teams</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .stat-pill { background: var(--muted-bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; font-size: 0.75rem; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .stat-pill strong { color: var(--fg); font-weight: 600; font-size: 0.875rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-top: 3px solid var(--gold); border-radius: 10px; overflow: hidden; box-shadow: 0 0 40px rgba(247,193,30,0.05); }

    .team-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color 0.15s; }
    .team-card:hover { border-color: var(--gold); }
    .team-header { padding: 16px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
    .team-emoji { font-size: 1.4rem; line-height: 1; }
    .team-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .team-name { font-weight: 700; font-size: 0.92rem; }
    .team-owner { font-size: 0.75rem; color: var(--muted); }
    .team-budget { margin-left: auto; text-align: right; }
    .team-budget .amt { font-size: 1rem; font-weight: 800; color: var(--gold); }
    .team-budget .lbl { font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
    .team-body { padding: 12px 20px; }
    .squad-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; font-size: 0.8rem; border-bottom: 1px solid var(--border); }
    .squad-row:last-child { border-bottom: none; }
    .sq-name { font-weight: 500; }
    .sq-role { font-size: 0.68rem; color: var(--muted); }
    .sq-price { color: var(--gold); font-weight: 700; font-size: 0.78rem; }
    .empty-squad { font-size: 0.78rem; color: var(--muted); padding: 8px 0; }
    .squad-count { font-size: 0.68rem; color: var(--muted); padding: 0 20px 12px; }
    .badge-c{background:rgba(247,193,30,0.15);color:var(--gold);border:1px solid rgba(247,193,30,0.4);font-size:0.58rem;padding:1px 5px;border-radius:3px;font-weight:800;margin-left:4px}
    .badge-vc{background:rgba(148,163,184,0.12);color:#94a3b8;border:1px solid rgba(148,163,184,0.3);font-size:0.58rem;padding:1px 5px;border-radius:3px;font-weight:800;margin-left:4px}
    .captain-name{color:var(--gold)!important;font-weight:700!important}
    .vc-name{color:#94a3b8!important;font-weight:600!important}
  </style>
  <script src="header.js"></script>
</head>
<body>

  <main style="max-width:1100px; margin:0 auto; padding:36px 24px;">
    <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:24px;">
      <div>
        <h1 style="font-size:1.25rem; font-weight:700; color:var(--fg); margin:0 0 2px;">Teams</h1>
        <p style="font-size:0.8rem; color:var(--muted); margin:0;">All 13 fantasy teams · Live budget & squads</p>
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <div class="stat-pill"><strong id="stat-total">13</strong> teams</div>
        <div class="stat-pill" style="color:#4ade80;"><strong id="stat-sold" style="color:#4ade80;">0</strong> sold</div>
        <div class="stat-pill" style="color:var(--gold);"><strong id="stat-spent" style="color:var(--gold);">0 CR</strong> spent</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;" id="teams-grid">
      <div style="text-align:center;padding:60px;color:var(--muted);grid-column:1/-1;">Loading teams…</div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
    import { getDatabase, ref, onValue }
      from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js';

    const app = initializeApp({
      apiKey: "AIzaSyB6icjFuutJqV3G2alfBrd2rJUmwghJxns",
      authDomain: "iplfantasy-952c4.firebaseapp.com",
      projectId: "iplfantasy-952c4",
      storageBucket: "iplfantasy-952c4.firebasestorage.app",
      messagingSenderId: "50120567665",
      appId: "1:50120567665:web:99123e475943cd71e3a4d0",
      databaseURL: "https://iplfantasy-952c4-default-rtdb.firebaseio.com"
    });
    const db = getDatabase(app);

    const FTMS = [
      { k:'Heet',     n:'Heet Hurricanes',    c:'#0EA5E9', e:'🌀' },
      { k:'Divij',    n:'Divij Dragons',      c:'#DC2626', e:'🐉' },
      { k:'Vrushank', n:'Vrushank Vikings',   c:'#7C3AED', e:'⚔️' },
      { k:'Shrey',    n:'Shrey Strikers',     c:'#F59E0B', e:'⚡' },
      { k:'Malhaar',  n:'Malhaar Monarchs',   c:'#D97706', e:'👑' },
      { k:'Shivansh', n:'Shivansh Sharks',    c:'#0F766E', e:'🦈' },
      { k:'Dev',      n:'Dev Dynamos',        c:'#EA580C', e:'💥' },
      { k:'Sai',      n:'Sai Supernovas',     c:'#9333EA', e:'🌟' },
      { k:'Moksh',    n:'Moksh Mavericks',    c:'#16A34A', e:'🤠' },
      { k:'Darshan',  n:'Darshan Daredevils', c:'#BE123C', e:'😈' },
      { k:'Rishab',   n:'Rishab Risers',      c:'#0369A1', e:'🚀' },
      { k:'Div',      n:'Div Dominators',     c:'#4D7C0F', e:'👊' },
      { k:'Mir',      n:'Mirs Magicians',     c:'#BE185D', e:'🪄' },
    ];

    function fmtL(lakhs) {
      if (lakhs >= 100) {
        const cr = lakhs / 100;
        return (cr % 1 === 0 ? cr : cr.toFixed(1)) + ' CR';
      }
      return lakhs + ' L';
    }

    let tData = {};

    onValue(ref(db, 'teams'), snap => {
      tData = snap.val() || {};
      render();
    });

    onValue(ref(db, 'sold'), snap => {
      const soldD = snap.val() || {};
      document.getElementById('stat-sold').textContent = Object.keys(soldD).length;
      let totalSpent = 0;
      Object.values(soldD).forEach(s => { totalSpent += s.priceLakhs || 0; });
      document.getElementById('stat-spent').textContent = fmtL(totalSpent);
    });

    function render() {
      const grid = document.getElementById('teams-grid');

      grid.innerHTML = FTMS.map(ft => {
        const td = tData[ft.k] || {};
        const budget = td.budgetLakhs ?? 10000;
        const captain = td.captain || '';
        const viceCaptain = td.viceCaptain || '';
        const squad = td.squad ? Object.entries(td.squad) : [];
        const spent = 10000 - budget;

        const squadHTML = squad.length > 0
          ? squad.map(([pk, s]) => {
            const isC = captain === pk, isVC = viceCaptain === pk;
            const cls = isC ? ' captain-name' : isVC ? ' vc-name' : '';
            const badge = isC ? ' <span class="badge-c">C</span>' : isVC ? ' <span class="badge-vc">VC</span>' : '';
            return `<div class="squad-row">
              <div><span class="sq-name${cls}">${s.name}${badge}</span> <span class="sq-role">· ${s.role}</span></div>
              <span class="sq-price">${fmtL(s.priceLakhs)}</span>
            </div>`;
          }).join('')
          : '<div class="empty-squad">No players yet</div>';

        return `<div class="team-card" style="border-left:3px solid ${ft.c};">
          <div class="team-header">
            <span class="team-emoji">${ft.e}</span>
            <div>
              <div class="team-name" style="color:${ft.c}">${ft.n}</div>
              <div class="team-owner">${ft.k}</div>
            </div>
            <div class="team-budget">
              <div class="amt">${fmtL(budget)}</div>
              <div class="lbl">Purse left</div>
            </div>
          </div>
          <div class="squad-count">${squad.length}/11 players · ${fmtL(spent)} spent</div>
          <div class="team-body">${squadHTML}</div>
        </div>`;
      }).join('');
    }
  </script>
</body>
</html>
